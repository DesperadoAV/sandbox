<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/6qXnY1GR/1770893073813.png">
    <title>Svitlo Slavutych - Emergency Ready</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* Екстрений банер */
        #emergency-banner {
            display: none;
            position: absolute;
            top: 0; width: 100%;
            background: #ff0000;
            color: white;
            z-index: 2005;
            padding: 12px 0;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .marquee { display: inline-block; white-space: nowrap; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* Кнопки */
        .ui-btn { position: absolute; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; }
        .side-btn { left: 15px; top: 55px; width: 48px; height: 48px; } /* Трохи опустив через банер */
        .info-btn { left: 15px; top: 115px; width: 48px; height: 48px; color: #228BE6; font-size: 20px; font-weight: bold; }
        .graph-btn { left: 15px; top: 175px; width: 48px; height: 48px; }
        .forecast-btn { left: 15px; top: 235px; width: 48px; height: 48px; font-size: 22px; }

        /* Модалки */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2100; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; width: 100%; max-width: 350px; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; }

        .forecast-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .f-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="emergency-banner"><div class="marquee" id="emergency-text"></div></div>

    <div id="map"></div>

    <div class="ui-btn side-btn" onclick="toggleMenu()"><img src="https://img.icons8.com/material-rounded/24/228BE6/layers.png"/></div>
    <div class="ui-btn info-btn" onclick="openInfo()">і</div>
    <div class="ui-btn graph-btn" onclick="toggleModal('graphModal')"><img src="https://img.icons8.com/material-rounded/24/228BE6/calendar.png"/></div>
    <div class="ui-btn forecast-btn" onclick="toggleModal('forecastModal')">🔮</div>

    <div class="modal" id="forecastModal" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="document.getElementById('forecastModal').style.display='none'">&times;</span>
            <h3 style="margin-top:0">Наступні події</h3>
            <div id="forecast-list"></div>
            <p style="font-size:11px; color:#999; margin-top:15px; text-align:center;">Дані згідно офіційних графіків</p>
        </div>
    </div>

    <script>
        const MAP_DATA_GID = "1507727419"; // ЗАМІНІТЬ на GID вашого аркуша MapData
        const DOC_ID = "2PACX-1vTDv155RMF-zxABtNBXm81ycd6eLswlpDqowPApt-ffwOn1q9J32hZucYSGvCMBDV0RpB1qfrRsHELs";
        
        let mapSettings = { emergency: "", queues: {} };

        // 1. Отримання налаштувань з MapData
        async function fetchMapSettings() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${MAP_DATA_GID}&t=${Date.now()}`;
                const res = await fetch(url);
                const csv = await res.text();
                const rows = csv.split(/\r?\n/).map(r => r.split(','));

                // Текст з C10 (Рядок 9, Індекс 2)
                const emerText = rows[9] ? rows[9][2] : "";
                const banner = document.getElementById('emergency-banner');
                if(emerText && emerText.trim() !== "") {
                    document.getElementById('emergency-text').innerText = "⚠️ " + emerText;
                    banner.style.display = "block";
                } else {
                    banner.style.display = "none";
                }

                // Зчитуємо дані черг (A, B, C, D)
                for(let i=1; i<=6; i++) {
                    if(rows[i]) {
                        mapSettings.queues[rows[i][0]] = {
                            color: rows[i][1] || "#888",
                            nextEvent: rows[i][2] || "немає даних",
                            eventTime: rows[i][3] || ""
                        };
                    }
                }
                updateForecastUI();
            } catch(e) { console.error("MapData Error:", e); }
        }

        function updateForecastUI() {
            const list = document.getElementById('forecast-list');
            list.innerHTML = Object.keys(mapSettings.queues).map(q => {
                const data = mapSettings.queues[q];
                return `
                    <div class="forecast-row">
                        <div style="display:flex; align-items:center;">
                            <div class="f-dot" style="background:${data.color}"></div>
                            <b>Черга ${q}</b>
                        </div>
                        <div style="font-size:13px;">
                            ${data.nextEvent} <span style="font-weight:bold; color:#228BE6;">${data.eventTime}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        // Початкове завантаження та цикл оновлення
        fetchMapSettings();
        // Далі йде ваш попередній скрипт мапи (fetchSheet, refreshAll)...
        // Важливо: у функціях малювання маркерів тепер можна використовувати mapSettings.queues[qName].color
        
        setInterval(() => {
            fetchMapSettings();
            // refreshAll(); // Оновлення маркерів
        }, 60000);

    </script>
</body>
</html>
