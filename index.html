<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/6qXnY1GR/1770893073813.png">
    <title>Svitlo Slavutych</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        #top-alert { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 2000; background: #fff3cd; color: #856404; padding: 10px 20px; border-radius: 30px; font-weight: bold; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid #ffeeba; display: none; text-align: center; max-width: 85%; }

        .ui-btn { position: absolute; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; }
        .side-btn { left: 15px; top: 15px; width: 48px; height: 48px; }
        .info-btn { left: 15px; top: 75px; width: 48px; height: 48px; color: #228BE6; font-size: 20px; font-weight: bold; }
        .graph-btn { left: 15px; top: 135px; width: 48px; height: 48px; }
        .forecast-btn { left: 15px; top: 195px; width: 48px; height: 48px; font-size: 22px; }
        
        .zoom-ctrl { position: absolute; right: 15px; bottom: 30px; z-index: 1001; display: flex; flex-direction: column; gap: 8px; }
        .z-btn { width: 44px; height: 44px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; }
        
        .nez-wrap { width: 100%; height: 100%; background: white; border: 2px solid #3498db; border-radius: 50%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .nez-wrap img { width: 80%; height: 80%; object-fit: contain; }

        .q-menu { position: absolute; left: 75px; top: 15px; width: 280px; max-height: 85vh; background: white; border-radius: 16px; display: none; flex-direction: column; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        #menu-list { overflow-y: auto; flex: 1; }
        .q-header { display: flex; align-items: center; padding: 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-weight: bold; }
        .q-color-box { width: 12px; height: 12px; border-radius: 3px; margin-right: 10px; }
        
        .address-list { display: none; background: #f9f9f9; }
        .address-item { padding: 10px 15px 10px 20px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; color: #555; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2100; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; border-radius: 28px; padding: 30px; width: 100%; max-width: 420px; text-align: center; position: relative; }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; border: none; background: none; }
        .modal-title { color: #228BE6; font-size: 22px; font-weight: bold; margin-bottom: 15px; display: block; }
        .modal-text { font-size: 15px; color: #333; line-height: 1.5; margin-bottom: }
        .modal-divider { height: 1px; background: #eee; margin: 20px 0; }
        .social-container { display: flex; justify-content: space-around; align-items: center; }
        .soc-link { display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="top-alert"></div>
    <div id="map"></div>

    <div class="ui-btn side-btn" onclick="toggleMenu()"><img src="https://img.icons8.com/material-rounded/24/228BE6/layers.png"/></div>
    <div class="ui-btn info-btn" onclick="toggleModal('infoModal')">і</div>
    <div class="ui-btn graph-btn" onclick="toggleModal('graphModal')"><img src="https://img.icons8.com/material-rounded/24/228BE6/calendar.png"/></div>
    <div class="ui-btn forecast-btn" onclick="toggleModal('forecastModal')">🔮</div>

    <div class="zoom-ctrl">
        <div class="z-btn" onclick="map.zoomIn()">+</div>
        <div class="z-btn" onclick="map.zoomOut()">−</div>
    </div>

    <div class="q-menu" id="qMenu">
        <div style="padding:15px; font-weight:bold; text-align:center; border-bottom:1px solid #eee; background: #f8f9fa;">Об'єкти міста</div>
        <div id="menu-list"></div>
    </div>

    <div class="modal" id="infoModal" onclick="toggleModal('infoModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-x" onclick="toggleModal('infoModal')">×</button>
            <span class="modal-title">Svitlo Slavutych</span>
            <p class="modal-text">Цей проект допомагає мешканцям міста Славутич відстежувати стан електропостачання в режимі реального часу.</p>
            <p class="modal-text">Дані оновлюються автоматично з офіційних джерел та звітів користувачів.</p>
            
            <div class="modal-divider"></div>
            
            <div class="social-container">
                <a href="https://t.me/svitlo_slavutych" target="_blank" class="soc-link" style="color: #228BE6;">
                    <img src="https://img.icons8.com/color/24/telegram-app.png"> TG
                </a>
                <a href="https://invite.viber.com/?g2=AQB78E%2B3m1A0F1Gf3V9U7yL6uLw9O%2FrR" target="_blank" class="soc-link" style="color: #7360f2;">
                    <img src="https://img.icons8.com/color/24/viber.png"> VB
                </a>
            </div>
        </div>
    </div>

    <div class="modal" id="forecastModal" onclick="toggleModal('forecastModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-x" onclick="toggleModal('forecastModal')">×</button>
            <h3>Графік черг</h3>
            <div id="forecast-list"></div>
        </div>
    </div>

    <div class="modal" id="graphModal" onclick="toggleModal('graphModal')">
        <div class="modal-content" style="max-width: 500px;" onclick="event.stopPropagation()">
            <button class="close-x" onclick="toggleModal('graphModal')">×</button>
            <img src="https://raw.githubusercontent.com/amvasylets/Svitlo_in_Slavutych/refs/heads/main/charts/summary_today.png" style="width:100%; border-radius:10px;">
        </div>
    </div>

    <script>
        const DOC_ID = "2PACX-1vTDv155RMF-zxABtNBXm81ycd6eLswlpDqowPApt-ffwOn1q9J32hZucYSGvCMBDV0RpB1qfrRsHELs";
        const MAP_DATA_GID = "1910800617";
        const CASTLE_URL = "https://raw.githubusercontent.com/DesperadoAV/sandbox/main/castle_blue.png";

        // ЧЕРГА 2.1 ТЕПЕР БЛАКИТНА (#3498db) ЯК НА СКРІНІ
        const QUEUE_CONFIG = {
            "1.1": { gid: "0", color: "#ff0000", icon: "red" },
            "2.1": { gid: "1407012161", color: "#3498db", icon: "blue" },
            "3.1": { gid: "774761347", color: "#9900ff", icon: "violet" },
            "3.2": { gid: "1047238720", color: "#ffcc00", icon: "gold" },
            "4.1": { gid: "877384835", color: "#ff9900", icon: "orange" },
            "6.1": { gid: "1811736051", color: "#009933", icon: "green" }
        };

        const PUNKT_NEZLAMNOSTI = [
            { name: "ЗБІЦ", lat: 51.523402, lng: 30.761510 },
            { name: "ЗДО №1 \"Калинка\"", lat: 51.525300, lng: 30.761493 },
            { name: "ЗДО №6 \"Крунк\"", lat: 51.516414, lng: 30.760005 },
            { name: "ККК", lat: 51.522346, lng: 30.753734 },
            { name: "КП \"ЖКЦ\"", lat: 51.517618, lng: 30.750250 },
            { name: "Ліцей \"БезМеж\"", lat: 51.522895, lng: 30.766611 },
            { name: "Молодіжний Простір", lat: 51.521670, lng: 30.757146 },
            { name: "Пожежна частина", lat: 51.522111, lng: 30.744022 },
            { name: "Школа 1", lat: 51.525253, lng: 30.756295 },
            { name: "Школа 2", lat: 51.521059, lng: 30.750268 },
            { name: "Школа 3", lat: 51.517586, lng: 30.754901 }
        ];

        let map = L.map('map', { zoomControl: false }).setView([51.5229, 30.7598], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let layers = {}, sheetData = {}, markersStore = {};
        let nezlamnistLayer = L.layerGroup().addTo(map);

        function getNezIcon(zoom) {
            let s = zoom <= 14 ? 18 : (zoom === 15 ? 28 : 36);
            return L.divIcon({
                className: '',
                html: `<div class="nez-wrap" style="width:${s}px; height:${s}px;"><img src="${CASTLE_URL}"></div>`,
                iconSize: [s, s], iconAnchor: [s/2, s/2]
            });
        }

        function getQIcon(color, zoom) {
            let size = zoom <= 14 ? 12 : (zoom === 15 ? 24 : 32);
            return new L.Icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [size * 0.6, size], iconAnchor: [size * 0.3, size], shadowSize: [size, size]
            });
        }

        map.on('zoomend', () => {
            const z = map.getZoom();
            nezlamnistLayer.eachLayer(m => m.setIcon(getNezIcon(z)));
            for(let q in layers) layers[q].eachLayer(m => m.setIcon(getQIcon(m._isLight ? QUEUE_CONFIG[q].icon : "grey", z)));
        });

        async function updateData() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${MAP_DATA_GID}&t=${Date.now()}`);
                const rows = (await res.text()).split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));

                const alertText = rows[9]?.[2];
                const alertEl = document.getElementById('top-alert');
                if(alertText && alertText.trim() !== "") { alertEl.innerText = alertText; alertEl.style.display = 'block'; }
                else { alertEl.style.display = 'none'; }

                let fHtml = "";
                for (let i = 1; i <= 6; i++) {
                    const r = rows[i];
                    if(r) fHtml += `<div style="background:${QUEUE_CONFIG[r[0]]?.color}; color:white; margin-bottom:8px; padding:12px; border-radius:12px; display:flex; justify-content:space-between; font-size:14px;"><b>Черга ${r[0]}</b> <span>${r[2]} ${r[3]||''}</span></div>`;
                }
                document.getElementById('forecast-list').innerHTML = fHtml;

                nezlamnistLayer.clearLayers();
                PUNKT_NEZLAMNOSTI.forEach((p, i) => {
                    const r = rows[13 + i];
                    const popup = `<b>🏠 ${p.name}</b><br><div style="background:#eef2f7; padding:8px; border-radius:8px; margin-top:5px; font-size:12px;">${r?.[2]||'Інформація уточнюється'}<br><b>${r?.[3]||''}</b></div>`;
                    L.marker([p.lat, p.lng], { icon: getNezIcon(map.getZoom()) }).bindPopup(popup).addTo(nezlamnistLayer);
                });

                for(let q in QUEUE_CONFIG) await fetchQueue(q);
                renderMenu();
            } catch(e) {}
        }

        async function fetchQueue(q) {
            const conf = QUEUE_CONFIG[q];
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${conf.gid}&t=${Date.now()}`);
                const rows = (await res.text()).split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
                if(layers[q]) map.removeLayer(layers[q]);
                layers[q] = L.layerGroup();
                sheetData[q] = []; markersStore[q] = {};
                for (let i = 2; i < rows.length; i++) {
                    const r = rows[i]; if(!r[3]) continue;
                    const isLight = (r[5]?.toLowerCase() === 'y');
                    const m = L.marker([parseFloat(r[3].replace(',','.')), parseFloat(r[4].replace(',','.'))], { icon: getQIcon(isLight ? conf.icon : "grey", map.getZoom()) });
                    m._isLight = isLight;
                    m.bindPopup(`<b>${r[1]}</b><br>${isLight?'💡 Світло є':'🕯️ Світла немає'}<br><small>Оновлено: ${r[8]||''}</small>`);
                    m.addTo(layers[q]);
                    sheetData[q].push(r[1]); markersStore[q][r[1]] = m;
                }
                layers[q].addTo(map);
            } catch(e) {}
        }

        function renderMenu() {
            let html = `<div class="q-header" onclick="toggleAccordion('nez')"><div class="q-color-box" style="background:#3498db"></div><span>Пункти Незламності</span></div><div class="address-list" id="list-nez">${PUNKT_NEZLAMNOSTI.map(p => `<div class="address-item" style="border-left: 4px solid #3498db" onclick="focusNez('${p.lat}','${p.lng}')">${p.name}</div>`).join('')}</div>`;
            for(let q in QUEUE_CONFIG) {
                const col = QUEUE_CONFIG[q].color;
                html += `<div class="q-header" onclick="toggleAccordion('${q}')"><div class="q-color-box" style="background:${col}"></div><span>Черга ${q}</span></div><div class="address-list" id="list-${q}">${(sheetData[q]||[]).map(a => `<div class="address-item" style="border-left: 4px solid ${col}" onclick="focusAddr('${q}','${a}')">${a}</div>`).join('')}</div>`;
            }
            document.getElementById('menu-list').innerHTML = html;
        }

        function toggleAccordion(id) {
            const el = document.getElementById(`list-${id}`);
            const state = el.style.display === 'block';
            document.querySelectorAll('.address-list').forEach(d => d.style.display = 'none');
            el.style.display = state ? 'none' : 'block';
        }

        function focusAddr(q, a) { const m = markersStore[q][a]; if(m) { map.setView(m.getLatLng(), 18); m.openPopup(); toggleMenu(); } }
        function focusNez(lat, lng) { map.setView([lat, lng], 18); toggleMenu(); }
        function toggleMenu() { const m = document.getElementById('qMenu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        function toggleModal(id) { const m = document.getElementById(id); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }

        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
