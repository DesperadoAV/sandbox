<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/6qXnY1GR/1770893073813.png">
    <title>Svitlo Sandbox - Direct Layers</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* Кнопка шарів */
        .side-btn {
            position: absolute; left: 10px; top: 100px;
            width: 40px; height: 40px; background: white; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1001; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Меню черг */
        .q-menu {
            position: absolute; left: 60px; top: 100px;
            width: 220px; background: white; border-radius: 10px; display: none;
            flex-direction: column; z-index: 1001; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            padding: 12px;
        }
        .q-menu-title { font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 8px; font-size: 15px; }
        .q-menu-item { display: flex; align-items: center; padding: 8px; gap: 12px; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        .q-menu-item:hover { background: #f0f0f0; }
        .q-dot-icon { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
        
        /* Стиль вікна з інфо */
        .status-tag { display: inline-block; padding: 3px 10px; border-radius: 5px; color: white; font-weight: bold; margin: 8px 0; font-size: 12px; }
        .popup-info { font-size: 12px; color: #444; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="side-btn" onclick="toggleMenu()">
        <img src="https://img.icons8.com/material-outlined/24/000000/layers.png"/>
    </div>

    <div class="q-menu" id="qMenu">
        <div class="q-menu-title">Виберіть чергу</div>
        <div id="menu-list">Завантаження...</div>
    </div>

    <script>
        const SHEET_ID = "1QsynzpjvrRbZIagIdEd2TdjY228suZhXz8PxDJN8H68";
        const DATA_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=MapData`;

        // Ініціалізація карти (використовуємо OSM як підкладку для тестів)
        const map = L.map('map', { zoomControl: true }).setView([51.5229, 30.7598], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let layers = {}; 
        let activeQueues = new Set(["1.1", "2.1", "3.1", "3.2", "4.1", "6.1"]);

        function toggleMenu() {
            const m = document.getElementById('qMenu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function loadPoints() {
            try {
                const res = await fetch(DATA_URL + "&t=" + Date.now());
                const csv = await res.text();
                // Розбиваємо CSV на рядки, враховуючи лапки
                const rows = csv.split(/\r?\n/);

                // Очищення
                Object.values(layers).forEach(g => map.removeLayer(g));
                layers = {};
                const queueMeta = {};

                // Починаємо з i=2 (пропускаємо заголовки)
                for (let i = 2; i < rows.length; i++) {
                    const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    if (cols.length < 11 || !cols[4] || !cols[5]) continue;

                    const address = cols[0];
                    const qKey = address.includes(':') ? address.split(':')[0].replace('Черга ', '').trim() : "Інше";
                    
                    const lat = parseFloat(cols[4].replace(',', '.'));
                    const lng = parseFloat(cols[5].replace(',', '.'));
                    if (isNaN(lat) || isNaN(lng)) continue;

                    const status = cols[7]; // Стовпець H
                    const isOff = status.toLowerCase().includes("немає");
                    const baseColor = cols[1]; // Стовпець B
                    const displayColor = isOff ? "#808080" : baseColor;

                    if (!layers[qKey]) layers[qKey] = L.layerGroup();

                    const marker = L.circleMarker([lat, lng], {
                        radius: 7,
                        fillColor: displayColor,
                        color: "#fff",
                        weight: 1,
                        fillOpacity: 0.9
                    });

                    marker.bindPopup(`
                        <div style="min-width:160px">
                            <b style="font-size:14px">${address}</b><br>
                            <span class="status-tag" style="background:${displayColor}">${status}</span>
                            <div class="popup-info">
                                <b>Коментар:</b> ${cols[8] || '—'}<br>
                                <b>Прогноз:</b> ${cols[9] || '—'}<br>
                                <small style="color:#999">Оновлено: ${cols[10] || '—'}</small>
                            </div>
                        </div>
                    `);

                    marker.addTo(layers[qKey]);
                    if (!queueMeta[qKey]) queueMeta[qKey] = baseColor;
                }

                renderMenu(queueMeta);
                refreshMap();
            } catch (e) {
                console.error("Fetch Error:", e);
                document.getElementById('menu-list').innerHTML = "Помилка завантаження";
            }
        }

        function renderMenu(meta) {
            const list = document.getElementById('menu-list');
            const sortedKeys = Object.keys(meta).sort();
            
            list.innerHTML = sortedKeys.map(q => {
                const isActive = activeQueues.has(q);
                return `
                    <div class="q-menu-item" onclick="toggleLayer('${q}')">
                        <div class="q-dot-icon" style="background:${meta[q]}"></div>
                        <span style="flex:1; font-weight:${isActive?'bold':'normal'}">Черга ${q}</span>
                        <span style="font-size:16px">${isActive?'👁️':'🙈'}</span>
                    </div>
                `;
            }).join('');
        }

        function toggleLayer(q) {
            if (activeQueues.has(q)) activeQueues.delete(q);
            else activeQueues.add(q);
            refreshMap();
            // Швидко оновити тільки іконки в меню
            const menu = document.getElementById('qMenu'); 
            loadPoints(); 
        }

        function refreshMap() {
            Object.keys(layers).forEach(q => {
                if (activeQueues.has(q)) layers[q].addTo(map);
                else map.removeLayer(layers[q]);
            });
        }

        loadPoints();
        setInterval(loadPoints, 30000);
    </script>
</body>
</html>
