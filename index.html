<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/6qXnY1GR/1770893073813.png">
    <title>Svitlo Slavutych</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .ui-btn { position: absolute; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; }
        .side-btn { left: 15px; top: 15px; width: 48px; height: 48px; }
        .info-btn { left: 15px; top: 75px; width: 48px; height: 48px; color: #228BE6; font-size: 20px; font-weight: bold; }
        .graph-btn { left: 15px; top: 135px; width: 48px; height: 48px; }
        .forecast-btn { left: 15px; top: 195px; width: 48px; height: 48px; font-size: 22px; }
        .zoom-ctrl { position: absolute; right: 15px; bottom: 30px; z-index: 1001; display: flex; flex-direction: column; gap: 8px; }
        .z-btn { width: 44px; height: 44px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; }
        .q-menu { position: absolute; left: 75px; top: 15px; width: 280px; max-height: 85vh; background: white; border-radius: 16px; display: none; flex-direction: column; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        #menu-list { overflow-y: auto; flex: 1; }
        .q-item-container { border-bottom: 1px solid #f0f0f0; }
        .q-header { display: flex; align-items: center; padding: 12px; cursor: pointer; }
        .q-eye { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-right: 8px; }
        .q-eye img { width: 20px; height: 20px; }
        .q-color-box { width: 12px; height: 12px; border-radius: 3px; margin-right: 10px; }
        .q-name { flex: 1; font-size: 14px; font-weight: bold; }
        .address-list { display: none; background: #f9f9f9; max-height: 200px; overflow-y: auto; }
        .address-item { padding: 10px 15px 10px 35px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; color: #444; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2100; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; border-radius: 24px; padding: 25px; width: 100%; max-width: 360px; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-screen { display: none; flex-direction: column; gap: 12px; }
        .modal-screen.active { display: flex; }
        .btn-link { display: flex; align-items: center; padding: 14px; border-radius: 14px; text-decoration: none; color: #333; font-weight: 600; background: #f7f8fa; border: 1px solid #eee; cursor: pointer; }
        .grid-item { padding: 12px; text-align: center; border-radius: 12px; text-decoration: none; color: white; font-weight: bold; font-size: 14px; }
        .forecast-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; margin-bottom: 8px; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-btn side-btn" onclick="toggleMenu()"><img src="https://img.icons8.com/material-rounded/24/228BE6/layers.png"/></div>
    <div class="ui-btn info-btn" onclick="openInfo()">і</div>
    <div class="ui-btn graph-btn" onclick="toggleModal('graphModal')"><img src="https://img.icons8.com/material-rounded/24/228BE6/calendar.png"/></div>
    <div class="ui-btn forecast-btn" onclick="toggleModal('forecastModal')">🔮</div>

    <div class="zoom-ctrl">
        <div class="z-btn" onclick="map.zoomIn()">+</div>
        <div class="z-btn" onclick="map.zoomOut()">−</div>
    </div>

    <div class="q-menu" id="qMenu">
        <div style="padding:15px; font-weight:bold; text-align:center; border-bottom:1px solid #eee;">Об'єкти міста</div>
        <div id="menu-list"></div>
    </div>

    <script>
        const DOC_ID = "2PACX-1vTDv155RMF-zxABtNBXm81ycd6eLswlpDqowPApt-ffwOn1q9J32hZucYSGvCMBDV0RpB1qfrRsHELs";
        const MAP_DATA_GID = "1910800617";
        
        // Твоє перевірене посилання
        const ICON_URL = "https://github.com/DesperadoAV/sandbox/blob/main/castle_blue.png?raw=true";

        const QUEUE_CONFIG = {
            "1.1": { gid: "0", color: "#ff0000", icon: "red" },
            "2.1": { gid: "1407012161", color: "#0000ff", icon: "blue" },
            "3.1": { gid: "774761347", color: "#9900ff", icon: "violet" },
            "3.2": { gid: "1047238720", color: "#ffcc00", icon: "gold" },
            "4.1": { gid: "877384835", color: "#ff9900", icon: "orange" },
            "6.1": { gid: "1811736051", color: "#009933", icon: "green" }
        };

        const PUNKT_NEZLAMNOSTI = [
            { name: "Загальноміський бібліотечно-інформаційний центр", lat: 51.523402, lng: 30.761510 },
            { name: "ЗДО №1 \"Калинка\"", lat: 51.525300, lng: 30.761493 },
            { name: "ЗДО №6 \"Крунк\"", lat: 51.516414, lng: 30.760005 },
            { name: "Кіноконцертний комплекс", lat: 51.522346, lng: 30.753734 },
            { name: "КП \"ЖКЦ\"", lat: 51.517618, lng: 30.750250 },
            { name: "Ліцей \"БезМеж\" (школа 4)", lat: 51.522895, lng: 30.766611 },
            { name: "Молодіжний Простір", lat: 51.521670, lng: 30.757146 },
            { name: "Пожежна частина", lat: 51.522111, lng: 30.744022 },
            { name: "Школа 1", lat: 51.525253, lng: 30.756295 },
            { name: "Школа 2", lat: 51.521059, lng: 30.750268 },
            { name: "Школа 3", lat: 51.517586, lng: 30.754901 }
        ];

        const slavutychBounds = L.latLngBounds(L.latLng(51.505, 30.730), L.latLng(51.545, 30.790));
        let map = L.map('map', { zoomControl: false, maxBounds: slavutychBounds, maxBoundsViscosity: 1.0 }).setView([51.5229, 30.7598], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { minZoom: 14, maxZoom: 19 }).addTo(map);

        let layers = {}, activeQueues = new Set(Object.keys(QUEUE_CONFIG)), sheetData = {}, markersStore = {};
        let nezlamnistLayer = L.layerGroup().addTo(map);

        // Динамічний розмір маркерів при зміні зуму
        function getIcon(color, zoom) {
            let size = zoom <= 14 ? 18 : (zoom === 15 ? 26 : 38);
            return new L.Icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [size * 0.6, size],
                iconAnchor: [size * 0.3, size],
                popupAnchor: [1, -size * 0.8],
                shadowSize: [size, size]
            });
        }

        function getNezlamnistIcon(zoom) {
            let size = zoom <= 14 ? 20 : (zoom === 15 ? 28 : 36);
            let imgSize = size * 0.7;
            return L.divIcon({
                html: `<div style="width:${size}px; height:${size}px; background-color:white; border:2px solid #3498db; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(0,0,0,0.3);"><img src="${ICON_URL}" style="width:${imgSize}px; height:${imgSize}px;"/></div>`,
                className: '', iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -size/2]
            });
        }

        map.on('zoomend', function() {
            const z = map.getZoom();
            nezlamnistLayer.eachLayer(m => m.setIcon(getNezlamnistIcon(z)));
            for (let q in layers) {
                layers[q].eachLayer(m => {
                    const content = m.getPopup().getContent();
                    const isLight = content.includes('💡');
                    m.setIcon(getIcon(isLight ? QUEUE_CONFIG[q].icon : "grey", z));
                });
            }
        });

        async function updateGlobals() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${MAP_DATA_GID}&t=${Date.now()}`);
                const rows = (await res.text()).split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                return rows;
            } catch(e) { return null; }
        }

        function setupNezlamnist(globalRows) {
            nezlamnistLayer.clearLayers();
            const z = map.getZoom();
            PUNKT_NEZLAMNOSTI.forEach((p, idx) => {
                const row = globalRows ? globalRows[13 + idx] : null;
                const info = row ? row[2] : "Пункт обігріву";
                const content = `<div style="min-width:180px;"><b style="color:#3498db;">🏠 ${p.name}</b><br><div style="margin-top:8px; padding:8px; background:#e3f2fd; border-radius:8px; font-size:12px;">${info}</div></div>`;
                L.marker([p.lat, p.lng], { icon: getNezlamnistIcon(z) }).bindPopup(content).addTo(nezlamnistLayer);
            });
        }

        async function fetchQueue(q) {
            const conf = QUEUE_CONFIG[q];
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${conf.gid}&t=${Date.now()}`);
                const rows = (await res.text()).split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
                layers[q] = L.layerGroup();
                const z = map.getZoom();
                for (let i = 2; i < rows.length; i++) {
                    const r = rows[i]; if (!r[3]) continue;
                    const light = (r[5]?.toLowerCase() === 'y');
                    L.marker([parseFloat(r[3].replace(',','.')), parseFloat(r[4].replace(',','.'))], { icon: getIcon(light ? conf.icon : "grey", z) })
                     .bindPopup(`<b>${r[1]}</b><br>${light?'💡 Є світло':'🕯️ Немає світла'}`).addTo(layers[q]);
                }
                if (activeQueues.has(q)) layers[q].addTo(map);
            } catch(e) {}
        }

        async function init() {
            const rows = await updateGlobals();
            setupNezlamnist(rows);
            for(let q in QUEUE_CONFIG) await fetchQueue(q);
            renderMenu();
        }
        
        function renderMenu() {
            let html = `<div class="q-item-container"><div class="q-header" onclick="toggleAccordion('nezlamnist')"><div class="q-eye"><img src="https://img.icons8.com/material-rounded/20/228BE6/visible.png"/></div><div class="q-color-box" style="background:#3498db"></div><span class="q-name">Пункти Незламності</span></div><div class="address-list" id="list-nezlamnist" style="border-left: 5px solid #3498db;">${PUNKT_NEZLAMNOSTI.map(p => `<div class="address-item">${p.name}</div>`).join('')}</div></div>`;
            document.getElementById('menu-list').innerHTML = html;
        }

        function toggleMenu() { const m = document.getElementById('qMenu'); m.style.display = (m.style.display === 'flex')? 'none' : 'flex'; }
        function toggleAccordion(q) { const el = document.getElementById(`list-${q}`); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }

        init();
    </script>
</body>
</html>
