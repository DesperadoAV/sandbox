<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/6qXnY1GR/1770893073813.png">
    <title>Svitlo Slavutych</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        /* Кнопки інтерфейсу */
        .ui-btn { position: absolute; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; }
        .side-btn { left: 15px; top: 15px; width: 48px; height: 48px; }
        .info-btn { left: 15px; top: 75px; width: 48px; height: 48px; color: #228BE6; font-size: 20px; font-weight: bold; }
        .graph-btn { left: 15px; top: 135px; width: 48px; height: 48px; }

        .zoom-ctrl { position: absolute; right: 15px; bottom: 30px; z-index: 1001; display: flex; flex-direction: column; gap: 8px; }
        .z-btn { width: 44px; height: 44px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* Меню черг (Акордеон) */
        .q-menu { position: absolute; left: 75px; top: 15px; width: 280px; max-height: 85vh; background: white; border-radius: 16px; display: none; flex-direction: column; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5); overflow: hidden; }
        .q-menu-title { font-weight: bold; font-size: 16px; padding: 16px; border-bottom: 1px solid #eee; text-align: center; }
        #menu-list { overflow-y: auto; flex: 1; }

        .q-item-container { border-bottom: 1px solid #f0f0f0; position: relative; }
        .q-header { display: flex; align-items: center; padding: 12px; cursor: pointer; }
        .q-color-box { width: 12px; height: 12px; border-radius: 3px; margin-right: 10px; }
        .q-name { flex: 1; font-size: 14px; font-weight: 500; }
        .q-count { font-size: 12px; color: #999; margin-left: 5px; }

        /* Стилі для ока (Фікс розміру та великого ока) */
        .q-eye { margin-right: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }
        .q-eye img { width: 20px; height: 20px; transition: 0.2s; }
        .q-eye.hidden img { opacity: 0.5; } /* Сіре око, коли приховано */

        /* Список адрес (з кольоровою стрічкою зліва) */
        .address-list { display: none; background: #f9f9f9; max-height: 200px; overflow-y: auto; font-size: 13px; border-top: 1px solid #f0f0f0; }
        .address-item { padding: 8px 15px 8px 30px; border-bottom: 1px solid #eee; cursor: pointer; color: #555; transition: 0.2s; }
        .address-item:hover { background: #eef2f7; color: #000; }
        .address-item:last-child { border-bottom: none; }

        /* Модальні вікна (Інфо та Графік) */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; width: 100%; max-width: 360px; position: relative; min-height: 250px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #aaa; }
        
        .modal-screen { display: none; flex-direction: column; gap: 12px; }
        .modal-screen.active { display: flex; }

        /* Посилання та сітка (з емодзі) */
        .btn-link { display: flex; align-items: center; padding: 14px; border-radius: 14px; text-decoration: none; color: #333; font-weight: 600; background: #f7f8fa; border: 1px solid #eee; transition: 0.2s; }
        .btn-link:hover { background: #f0f2f5; }
        .btn-link img { width: 28px; margin-right: 12px; }

        .grid-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-item { padding: 12px; text-align: center; background: #f7f8fa; border-radius: 12px; text-decoration: none; color: #333; font-weight: bold; border: 1px solid #eee; font-size: 14px; transition: 0.2s; }
        .grid-item:hover { background: #eef1f4; }

        .back-btn { margin-bottom: 15px; color: #228BE6; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-btn side-btn" onclick="toggleMenu()"><img src="https://img.icons8.com/material-rounded/24/228BE6/layers.png"/></div>
    <div class="ui-btn info-btn" onclick="openInfo()">і</div>
    <div class="ui-btn graph-btn" onclick="toggleModal('graphModal')"><img src="https://img.icons8.com/material-rounded/24/228BE6/calendar.png"/></div>

    <div class="zoom-ctrl">
        <div class="z-btn" onclick="map.zoomIn()">+</div>
        <div class="z-btn" onclick="map.zoomOut()">−</div>
    </div>

    <div class="q-menu" id="qMenu">
        <div class="q-menu-title">Черги Славутича</div>
        <div id="menu-list"></div>
    </div>

    <div class="modal" id="infoModal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('infoModal')">&times;</span>
            
            <div id="screen-main" class="modal-screen active">
                <h3 style="margin-top:0; color:#228BE6;">Svitlo Slavutych</h3>
                <p style="font-size: 14px; color: #555;">Оберіть месенджер для сповіщень:</p>
                <div class="btn-link" onclick="showScreen('tg')"><img src="https://img.icons8.com/color/28/telegram-app.png"/> Telegram Канали</div>
                <div class="btn-link" onclick="showScreen('vb')" style="margin-top:10px;"><img src="https://img.icons8.com/color/28/viber.png"/> Viber Спільноти</div>
            </div>

            <div id="screen-tg" class="modal-screen">
                <div class="back-btn" onclick="showScreen('main')">← Назад</div>
                <h4>🔵 Telegram Канали</h4>
                <div class="grid-links" id="tg-grid"></div>
                <a id="tg-news-link" href="" target="_blank" class="btn-link" style="margin-top:15px; background:#e3f2fd; justify-content: center;">📢 Канал новин</a>
            </div>

            <div id="screen-vb" class="modal-screen">
                <div class="back-btn" onclick="showScreen('main')">← Назад</div>
                <h4>🟣 Viber Спільноти</h4>
                <div class="grid-links" id="vb-grid"></div>
                <a id="vb-news-link" href="" target="_blank" class="btn-link" style="margin-top:15px; background:#f3e5f5; justify-content: center;">📢 Спільнота новин</a>
            </div>
        </div>
    </div>

    <div class="modal" id="graphModal" onclick="this.style.display='none'">
        <div class="modal-content" style="max-width: 600px; padding:15px;" onclick="event.stopPropagation()">
            <img src="https://raw.githubusercontent.com/amvasylets/Svitlo_in_Slavutych/refs/heads/main/charts/summary_today.png" style="width:100%; border-radius:10px;">
        </div>
    </div>

    <script>
        const LINKS = {
            tg: {
                "1.1": "https://t.me/svitlo_in_Slavutych_1_1",
                "2.1": "https://t.me/svitlo_in_Slavutych_2_1",
                "3.1": "https://t.me/svitlo_in_Slavutych_3_1",
                "3.2": "https://t.me/svitlo_in_Slavutych_3_2",
                "4.1": "https://t.me/svitlo_in_Slavutych_4_1",
                "6.1": "https://t.me/svitlo_in_Slavutych_6_1",
                "news": "https://t.me/svitlo_in_Slavutych_News" // Пряме посилання
            },
            vb: {
                "1.1": "https://invite.viber.com/?g2=AQAwYtpyJWoodlZaVSylf8qXJh%2BIkorI%2BUEIlSNEjLY97kwXcxRXWcee8Wt%2FJM%2FS",
                "2.1": "https://invite.viber.com/?g2=AQBXEog0eJuMg1ZaVvzFZ14R%2Bq%2B3qDs5gmfU3pLXpwkPygNpg43EBTllJkScCQI6",
                "3.1": "https://invite.viber.com/?g2=AQA8UIh2a1ur71ZaVlCe5j56cKWAwAem1kuhxYeCg9xsUb8AFCKgRE5duiSA3fvW",
                "3.2": "https://invite.viber.com/?g2=AQA9Od9EXDrYslZaNY2rHJ1v1t8S5lA9RGxcLlvDP4ujK3n%2BHMvVHzeWmldseJdN",
                "4.1": "https://invite.viber.com/?g2=AQAr4i0FDuS0TlZaWDF6W2Hk%2BTDJrVrCLKTBQSvAwDb7JPuDYn0HE0WtouQyqIm7",
                "6.1": "https://invite.viber.com/?g2=AQBP%2BePVKBjDBFZaVeCnWMT9gn%2Fl2vl2636E%2B9vRvecZjNegiPbNxN93KG90spyY",
                "news": "https://invite.viber.com/?g2=AQBWONG%2BDtc6YVZaVt3j7%2BE73z2aD5aruhm7JFLEDXOExJuSOJZd6Ca2OsxdFHLo" // Пряме посилання
            }
        };

        const DOC_ID = "2PACX-1vTDv155RMF-zxABtNBXm81ycd6eLswlpDqowPApt-ffwOn1q9J32hZucYSGvCMBDV0RpB1qfrRsHELs";
        const QUEUE_CONFIG = {
            "1.1": { gid: "0", color: "#ff0000", icon: "red" },
            "2.1": { gid: "1407012161", color: "#0000ff", icon: "blue" },
            "3.1": { gid: "774761347", icon: "violet", color: "#9900ff" },
            "3.2": { gid: "1047238720", icon: "gold", color: "#ffcc00" },
            "4.1": { gid: "877384835", icon: "orange", color: "#ff9900" },
            "6.1": { gid: "1811736051", icon: "green", color: "#009933" }
        };

        const map = L.map('map', { zoomControl: false }).setView([51.5229, 30.7598], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let layers = {}; 
        let activeQueues = new Set(Object.keys(QUEUE_CONFIG));
        let sheetData = {};
        let markersStore = {};

        function getIcon(color) {
            return new L.Icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
            });
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function showScreen(id) {
            document.querySelectorAll('.modal-screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-'+id).classList.add('active');
        }

        function openInfo() {
            const qs = Object.keys(QUEUE_CONFIG);
            // Сітка для TG
            document.getElementById('tg-grid').innerHTML = qs.map(q => `<a href="${LINKS.tg[q]}" target="_blank" class="grid-item">${q}</a>`).join('');
            // Посилання на новини TG
            document.getElementById('tg-news-link').href = LINKS.tg.news;

            // Сітка для VB
            document.getElementById('vb-grid').innerHTML = qs.map(q => `<a href="${LINKS.vb[q]}" target="_blank" class="grid-item">${q}</a>`).join('');
            // Посилання на новини VB
            document.getElementById('vb-news-link').href = LINKS.vb.news;

            showScreen('main');
            toggleModal('infoModal');
        }

        function toggleMenu() {
            const m = document.getElementById('qMenu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function fetchQueue(qName) {
            const conf = QUEUE_CONFIG[qName];
            try {
                const url = `https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${conf.gid}&t=${Date.now()}`;
                const res = await fetch(url);
                const csv = await res.text();
                const rows = csv.split(/\r?\n/).map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
                
                if (layers[qName]) map.removeLayer(layers[qName]);
                layers[qName] = L.layerGroup();
                sheetData[qName] = [];
                markersStore[qName] = {};

                for (let i = 2; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row[3]) continue;
                    const lat = parseFloat(row[3].replace(',', '.'));
                    const lng = parseFloat(row[4].replace(',', '.'));
                    const hasLight = (row[5]?.toLowerCase() === 'y');
                    
                    const marker = L.marker([lat, lng], { icon: getIcon(hasLight ? conf.icon : "grey") })
                    .bindPopup(`<b>${row[1]}</b><br>${hasLight ? 'Світло є' : 'Немає'}`);
                    
                    marker.addTo(layers[qName]);
                    markersStore[qName][row[1]] = marker;
                    sheetData[qName].push(row[1]);
                }
                if (activeQueues.has(qName)) layers[qName].addTo(map);
            } catch (e) { console.error(e); }
        }

        function renderMenu() {
            document.getElementById('menu-list').innerHTML = Object.keys(QUEUE_CONFIG).map(name => {
                const isVisible = activeQueues.has(name);
                // Іконки ока (Фікс великого ока)
                const eyeSrc = isVisible 
                    ? "https://img.icons8.com/material-rounded/20/228BE6/visible.png" // Синє, видиме
                    : "https://img.icons8.com/material-rounded/20/999999/invisible.png"; // Сіре, перекреслене

                return `
                <div class="q-item-container">
                    <div class="q-header" onclick="toggleAccordion('${name}')">
                        <div class="q-eye ${isVisible?'':'hidden'}" onclick="event.stopPropagation(); toggleVisibility('${name}')">
                            <img src="${eyeSrc}"/>
                        </div>
                        <div class="q-color-box" style="background:${QUEUE_CONFIG[name].color}"></div>
                        <span class="q-name">Черга ${name}</span>
                        <span class="q-count">${(sheetData[name]||[]).length}</span>
                    </div>
                    <div class="address-list" id="list-${name}" style="border-left: 4px solid ${QUEUE_CONFIG[name].color};">
                        ${(sheetData[name]||[]).map(addr => `<div class="address-item" onclick="focusAddress('${name}', '${addr}')">${addr}</div>`).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function toggleVisibility(name) {
            if (activeQueues.has(name)) {
                activeQueues.delete(name);
                map.removeLayer(layers[name]);
            } else {
                activeQueues.add(name);
                layers[name].addTo(map);
            }
            renderMenu();
        }

        function toggleAccordion(name) {
            const el = document.getElementById(`list-${name}`);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('.address-list').forEach(d => d.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'block';
        }

        function focusAddress(q, a) {
            const m = markersStore[q][a];
            if(m) { map.setView(m.getLatLng(), 18); m.openPopup(); }
        }

        async function init() {
            for(let q in QUEUE_CONFIG) await fetchQueue(q);
            updateGlobals(); // Додаткові глобальні оновлення
            renderMenu();
        }
        init();
        setInterval(init, 60000); // Оновлення раз на хвилину
    </script>
</body>
</html>
