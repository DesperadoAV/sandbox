<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/6qXnY1GR/1770893073813.png">
    <title>Svitlo Sandbox - Live Debug</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        .side-btn {
            position: absolute; left: 15px; top: 15px;
            width: 48px; height: 48px; background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .q-menu {
            position: absolute; left: 75px; top: 15px;
            width: 260px; background: white; border-radius: 16px; display: none;
            flex-direction: column; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 16px; border: 1px solid #ddd;
        }
        .q-menu-title { font-weight: bold; font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; text-align: center; }
        .q-menu-item { display: flex; align-items: center; padding: 10px; gap: 12px; cursor: pointer; border-radius: 8px; }
        .q-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
        
        /* Статуси в меню */
        .loading-spin { font-size: 10px; color: #999; }
        .error-tag { color: red; font-size: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="side-btn" onclick="toggleMenu()">
        <img src="https://img.icons8.com/material-rounded/28/228BE6/layers.png"/>
    </div>

    <div class="q-menu" id="qMenu">
        <div class="q-menu-title">Перевірка черг...</div>
        <div id="menu-list"></div>
    </div>

    <script>
        const DOC_ID = "2PACX-1vTDv155RMF-zxABtNBXm81ycd6eLswlpDqowPApt-ffwOn1q9J32hZucYSGvCMBDV0RpB1qfrRsHELs";
        
        const SHEETS = [
            { gid: "0", name: "1.1" },
            { gid: "1407012161", name: "2.1" },
            { gid: "774761347", name: "3.1" },
            { gid: "1047238720", name: "3.2" },
            { gid: "877384835", name: "4.1" },
            { gid: "1811736051", name: "6.1" }
        ];

        const map = L.map('map', { zoomControl: false }).setView([51.5229, 30.7598], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let layers = {}; 
        let activeQueues = new Set(SHEETS.map(s => s.name));
        let sheetStatus = {}; // Для діагностики

        function toggleMenu() {
            const m = document.getElementById('qMenu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function fetchSheet(s) {
            sheetStatus[s.name] = { state: 'loading', points: 0, color: '#ccc' };
            renderMenu();

            try {
                const url = `https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${s.gid}&t=${Date.now()}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error("Помилка мережі");
                
                const csv = await res.text();
                const rows = csv.split(/\r?\n/).slice(1);

                if (layers[s.name]) map.removeLayer(layers[s.name]);
                layers[s.name] = L.layerGroup();

                let pointsAdded = 0;
                rows.forEach((row, index) => {
                    // Парсимо CSV, враховуючи можливі коми в лапках
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    
                    // Перевірка: чи є координати в стовпцях E та F (індекси 4 та 5)
                    const lat = parseFloat(cols[4]?.replace(',', '.'));
                    const lng = parseFloat(cols[5]?.replace(',', '.'));

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const address = cols[0] || "Без адреси";
                        const baseColor = cols[1] || "#333";
                        const status = cols[7] || "Невідомо";
                        
                        if (pointsAdded === 0) sheetStatus[s.name].color = baseColor;

                        const isOff = status.toLowerCase().includes("немає");
                        const pointColor = isOff ? "#808080" : baseColor;

                        L.circleMarker([lat, lng], {
                            radius: 8, fillColor: pointColor, color: "white", weight: 2, fillOpacity: 0.9
                        }).bindPopup(`<b>${address}</b><br>Статус: ${status}`).addTo(layers[s.name]);
                        
                        pointsAdded++;
                    }
                });

                sheetStatus[s.name].state = 'ok';
                sheetStatus[s.name].points = pointsAdded;
                
                if (activeQueues.has(s.name)) layers[s.name].addTo(map);

            } catch (e) {
                console.error(`Помилка черги ${s.name}:`, e);
                sheetStatus[s.name].state = 'error';
            }
            renderMenu();
        }

        async function refreshAll() {
            await Promise.all(SHEETS.map(s => fetchSheet(s)));
        }

        function renderMenu() {
            const list = document.getElementById('menu-list');
            list.innerHTML = SHEETS.map(s => {
                const stat = sheetStatus[s.name] || { state: 'pending' };
                let info = '';
                if (stat.state === 'loading') info = '<span class="loading-spin">⌛...</span>';
                else if (stat.state === 'error') info = '<span class="error-tag">❌ Помилка</span>';
                else info = `<span style="font-size:10px; color:#666">${stat.points} точок</span>`;

                return `
                <div class="q-menu-item" onclick="toggleLayer('${s.name}')">
                    <div class="q-dot" style="background:${stat.color}"></div>
                    <span style="flex:1; font-weight:${activeQueues.has(s.name)?'bold':'normal'}">Черга ${s.name}</span>
                    ${info}
                    <span style="margin-left:5px">${activeQueues.has(s.name)?'👁️':'🙈'}</span>
                </div>
                `;
            }).join('');
        }

        function toggleLayer(name) {
            if (activeQueues.has(name)) {
                activeQueues.delete(name);
                if (layers[name]) map.removeLayer(layers[name]);
            } else {
                activeQueues.add(name);
                if (layers[name]) layers[name].addTo(map);
            }
            renderMenu();
        }

        refreshAll();
        setInterval(refreshAll, 60000);
    </script>
</body>
</html>
