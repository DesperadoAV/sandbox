<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/6qXnY1GR/1770893073813.png">
    <title>Svitlo Slavutych - Info Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        .side-btn { position: absolute; left: 15px; top: 15px; width: 48px; height: 48px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .q-menu { position: absolute; left: 75px; top: 15px; width: 260px; background: white; border-radius: 16px; display: none; flex-direction: column; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5); padding: 16px; border: 1px solid #ddd; }
        .q-menu-title { font-weight: bold; font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; text-align: center; }
        .q-menu-item { display: flex; align-items: center; padding: 10px; gap: 12px; cursor: pointer; border-radius: 8px; }
        .q-color-box { width: 18px; height: 18px; border-radius: 5px; }

        /* Оновлений стиль вікна інформації */
        .popup-box { font-size: 14px; line-height: 1.6; min-width: 220px; color: #333; padding: 5px; }
        .p-addr { font-size: 16px; font-weight: bold; display: block; margin-bottom: 5px; color: #000; border-bottom: 2px solid #f0f0f0; padding-bottom: 4px; }
        .status-tag { display: inline-block; padding: 4px 12px; border-radius: 8px; color: white; font-weight: bold; margin: 8px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-row { margin: 4px 0; display: flex; flex-direction: column; }
        .label { color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: -2px; }
        .val { font-weight: 500; color: #222; }
        .divider { height: 1px; background: #eee; margin: 8px 0; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="side-btn" onclick="toggleMenu()"><img src="https://img.icons8.com/material-rounded/28/228BE6/layers.png"/></div>
    <div class="q-menu" id="qMenu">
        <div class="q-menu-title">Черги Славутича</div>
        <div id="menu-list"></div>
    </div>

    <script>
        const DOC_ID = "2PACX-1vTDv155RMF-zxABtNBXm81ycd6eLswlpDqowPApt-ffwOn1q9J32hZucYSGvCMBDV0RpB1qfrRsHELs";
        
        const QUEUE_CONFIG = {
            "1.1": { gid: "0", color: "#ff0000", icon: "red" },
            "2.1": { gid: "1407012161", color: "#0000ff", icon: "blue" },
            "3.1": { gid: "774761347", color: "#9900ff", icon: "violet" },
            "3.2": { gid: "1047238720", color: "#ffcc00", icon: "gold" },
            "4.1": { gid: "877384835", color: "#ff9900", icon: "orange" },
            "6.1": { gid: "1811736051", color: "#009933", icon: "green" }
        };

        const SHEETS = Object.keys(QUEUE_CONFIG).map(name => ({ name, ...QUEUE_CONFIG[name] }));
        const map = L.map('map', { zoomControl: false }).setView([51.5229, 30.7598], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let layers = {}; 
        let activeQueues = new Set(SHEETS.map(s => s.name));
        let sheetStats = {}; 

        function getIcon(color) {
            return new L.Icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
            });
        }

        function toggleMenu() {
            const m = document.getElementById('qMenu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function fetchSheet(s) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${s.gid}&t=${Date.now()}`;
                const res = await fetch(url);
                const csv = await res.text();
                const rows = csv.split(/\r?\n/).map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
                
                if (layers[s.name]) map.removeLayer(layers[s.name]);
                layers[s.name] = L.layerGroup();
                let pointsCount = 0;

                // Індекси згідно опису: C=2, F=5, H=7, I=8, J=9, K=10, Lat=4, Lng=5 (але краще автопошук)
                const headers = rows[0].map(h => h.toLowerCase());
                const idx = {
                    addr: headers.indexOf('address'),
                    desc: 2,  // Стовпчик C
                    lat: headers.indexOf('latitude'),
                    lng: headers.indexOf('longitude'),
                    trigger: 5, // Стовпчик F
                    status: 7,  // Стовпчик H
                    time: 8,    // Стовпчик I
                    expect: 9,  // Стовпчик J
                    expectT: 10 // Стовпчик K
                };

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.length < 6) continue;

                    const lat = parseFloat(row[idx.lat]?.replace(',', '.'));
                    const lng = parseFloat(row[idx.lng]?.replace(',', '.'));

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const fValue = row[idx.trigger]?.toLowerCase() || 'y';
                        const isOff = (fValue === 'no');
                        
                        const currentIcon = isOff ? "grey" : s.icon;
                        const badgeColor = isOff ? "#808080" : s.color;

                        const statusText = row[idx.status] || (isOff ? 'Немає світла' : 'Світло є');
                        const timeChange = row[idx.time] || '';
                        const expectation = `${row[idx.expect] || ''} ${row[idx.expectT] || ''}`.trim();
                        const description = row[idx.desc] || '';

                        L.marker([lat, lng], { icon: getIcon(currentIcon) })
                        .bindPopup(`
                            <div class="popup-box">
                                <span class="p-addr">${row[idx.addr] || 'Адреса'}</span>
                                <span class="status-tag" style="background:${badgeColor}">${statusText}</span>
                                
                                <div class="info-row">
                                    <span class="label">Змінено о:</span>
                                    <span class="val">${timeChange || '—'}</span>
                                </div>
                                
                                ${expectation ? `
                                <div class="info-row">
                                    <span class="label">Графік:</span>
                                    <span class="val">${expectation}</span>
                                </div>` : ''}

                                ${description ? `
                                <div class="divider"></div>
                                <div class="info-row">
                                    <span class="label">Опис:</span>
                                    <span class="val">${description}</span>
                                </div>` : ''}
                                
                                <div class="divider"></div>
                                <div style="font-size:10px; color:#aaa; text-align:right;">Черга ${s.name}</div>
                            </div>
                        `).addTo(layers[s.name]);
                        pointsCount++;
                    }
                }
                sheetStats[s.name] = pointsCount;
                if (activeQueues.has(s.name)) layers[s.name].addTo(map);
            } catch (e) { console.error(e); }
        }

        async function refreshAll() {
            await Promise.all(SHEETS.map(s => fetchSheet(s)));
            renderMenu();
        }

        function renderMenu() {
            const list = document.getElementById('menu-list');
            list.innerHTML = SHEETS.map(s => `
                <div class="q-menu-item" onclick="toggleLayer('${s.name}')">
                    <div class="q-color-box" style="background:${s.color}"></div>
                    <span style="flex:1; font-weight:${activeQueues.has(s.name)?'bold':'normal'}">Черга ${s.name}</span>
                    <span style="font-size:11px; color:#888">${sheetStats[s.name] || 0}</span>
                </div>
            `).join('');
        }

        function toggleLayer(name) {
            if (activeQueues.has(name)) { activeQueues.delete(name); map.removeLayer(layers[name]); }
            else { activeQueues.add(name); layers[name].addTo(map); }
            renderMenu();
        }

        refreshAll();
        setInterval(refreshAll, 60000);
    </script>
</body>
</html>
