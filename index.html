<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/6qXnY1GR/1770893073813.png">
    <title>Svitlo Slavutych - Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        .side-btn {
            position: absolute; left: 15px; top: 15px;
            width: 48px; height: 48px; background: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .q-menu {
            position: absolute; left: 75px; top: 15px;
            width: 260px; background: white; border-radius: 16px; display: none;
            flex-direction: column; z-index: 1001; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 16px; border: 1px solid #ddd;
        }
        .q-menu-title { font-weight: bold; font-size: 16px; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; text-align: center; }
        .q-menu-item { display: flex; align-items: center; padding: 10px; gap: 12px; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .q-menu-item:hover { background: #f0f7ff; }
        .q-color-box { width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; }
        
        .status-tag { display: inline-block; padding: 3px 10px; border-radius: 6px; color: white; font-weight: bold; margin: 8px 0; font-size: 11px; }
        .popup-box { font-size: 13px; line-height: 1.4; color: #333; min-width: 160px; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="side-btn" onclick="toggleMenu()"><img src="https://img.icons8.com/material-rounded/28/228BE6/layers.png"/></div>

    <div class="q-menu" id="qMenu">
        <div class="q-menu-title">Черги Славутича</div>
        <div id="menu-list"></div>
    </div>

    <script>
        const DOC_ID = "2PACX-1vTDv155RMF-zxABtNBXm81ycd6eLswlpDqowPApt-ffwOn1q9J32hZucYSGvCMBDV0RpB1qfrRsHELs";
        
        // ХАРДКОД КОЛЬОРІВ ТА ПАРАМЕТРІВ (Кольори маркерів: red, blue, violet, gold, orange, green)
        const QUEUE_CONFIG = {
            "1.1": { gid: "0", color: "#ff0000", icon: "red" },
            "2.1": { gid: "1407012161", color: "#0000ff", icon: "blue" },
            "3.1": { gid: "774761347", color: "#9900ff", icon: "violet" },
            "3.2": { gid: "1047238720", color: "#ffcc00", icon: "gold" },
            "4.1": { gid: "877384835", color: "#ff9900", icon: "orange" },
            "6.1": { gid: "1811736051", color: "#009933", icon: "green" }
        };

        const SHEETS = Object.keys(QUEUE_CONFIG).map(name => ({ name, ...QUEUE_CONFIG[name] }));
        const map = L.map('map', { zoomControl: false }).setView([51.5229, 30.7598], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let layers = {}; 
        let activeQueues = new Set(SHEETS.map(s => s.name));
        let sheetStats = {}; 

        function getIcon(colorName) {
            return new L.Icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${colorName}.png`,
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
            });
        }

        function toggleMenu() {
            const m = document.getElementById('qMenu');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        async function fetchSheet(s) {
            try {
                const url = `https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${s.gid}&t=${Date.now()}`;
                const res = await fetch(url);
                const csv = await res.text();
                // Розбиваємо CSV на масив рядків і колонок
                const rows = csv.split(/\r?\n/).map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
                
                if (layers[s.name]) map.removeLayer(layers[s.name]);
                layers[s.name] = L.layerGroup();
                let pointsCount = 0;

                // ШУКАЄМО ІНДЕКСИ (ВСЕЇДНИЙ АЛГОРИТМ)
                const headers = rows[0];
                const findIdx = (names) => headers.findIndex(h => names.some(n => h.toLowerCase().includes(n)));
                
                const idxLat = findIdx(['lat', 'широта']);
                const idxLng = findIdx(['long', 'lng', 'довгота']);
                const idxAddr = findIdx(['addr', 'адреса']);
                const idxStatus = findIdx(['status', 'статус']);

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    const lat = parseFloat(row[idxLat]?.replace(',', '.'));
                    const lng = parseFloat(row[idxLng]?.replace(',', '.'));

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const addr = row[idxAddr] || "Без назви";
                        const status = row[idxStatus] || "Світло є";
                        const isOff = status.toLowerCase().includes("немає");
                        
                        const iconColor = isOff ? "grey" : s.icon;
                        const hexColor = isOff ? "#808080" : s.color;

                        L.marker([lat, lng], { icon: getIcon(iconColor) })
                        .bindPopup(`
                            <div class="popup-box">
                                <b>${addr}</b><br>
                                <span class="status-tag" style="background:${hexColor}">${status}</span>
                            </div>
                        `).addTo(layers[s.name]);
                        pointsCount++;
                    }
                }

                sheetStats[s.name] = pointsCount;
                if (activeQueues.has(s.name)) layers[s.name].addTo(map);
            } catch (e) { console.error("Error " + s.name, e); }
        }

        async function refreshAll() {
            await Promise.all(SHEETS.map(s => fetchSheet(s)));
            renderMenu();
        }

        function renderMenu() {
            const list = document.getElementById('menu-list');
            list.innerHTML = SHEETS.map(s => `
                <div class="q-menu-item" onclick="toggleLayer('${s.name}')">
                    <div class="q-color-box" style="background:${s.color}"></div>
                    <span style="flex:1; font-weight:${activeQueues.has(s.name)?'bold':'normal'}">Черга ${s.name}</span>
                    <span style="font-size:11px; color:#888">${sheetStats[s.name] || 0}</span>
                    <span style="margin-left:8px">${activeQueues.has(s.name)?'👁️':'🙈'}</span>
                </div>
            `).join('');
        }

        function toggleLayer(name) {
            if (activeQueues.has(name)) { activeQueues.delete(name); map.removeLayer(layers[name]); }
            else { activeQueues.add(name); layers[name].addTo(map); }
            renderMenu();
        }

        refreshAll();
        setInterval(refreshAll, 60000);
    </script>
</body>
</html>
