<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>DEBUG MODE - Svitlo Sandbox</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: monospace; padding: 20px; }
        #debug-log { background: #000; border: 2px solid #333; padding: 15px; height: 300px; overflow-y: auto; margin-bottom: 20px; font-size: 12px; }
        .error { color: #ff4444; font-weight: bold; }
        .success { color: #00ff00; }
        #test-map { height: 200px; background: #222; border: 1px solid #444; display: none; }
    </style>
</head>
<body>

    <h2>🛠️ Діагностика підключення</h2>
    <div id="debug-log">Ініціалізація перевірки...<br></div>
    
    <div id="test-map"></div>

    <script>
        const log = (msg, type = '') => {
            const div = document.getElementById('debug-log');
            div.innerHTML += `<div class="${type}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            div.scrollTop = div.scrollHeight;
        };

        async function runTest() {
            const SHEET_ID = "1QsynzpjvrRbZIagIdEd2TdjY228suZhXz8PxDJN8H68";
            // Пряме посилання на CSV експорт
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&id=${SHEET_ID}&gid=0`;

            log(`1. Спроба з'єднатися з Google Таблицею...`);
            log(`URL: <a href="${url}" target="_blank" style="color:cyan">Перевірити посилання вручну</a>`);

            try {
                const response = await fetch(url + "&t=" + Date.now());
                
                if (!response.ok) {
                    throw new Error(`Помилка HTTP! Статус: ${response.status}`);
                }

                log(`2. Відповідь отримана! Розмір: ${response.statusText}`, 'success');
                
                const data = await response.text();
                const lines = data.split('\n');
                log(`3. Отримано рядків: ${lines.length}`, 'success');

                if (lines.length < 5) {
                    log(`⚠️ Увага: Таблиця занадто коротка. Перевірте, чи це той аркуш.`, 'error');
                }

                log(`4. Перевірка перших даних:`);
                log(`Перший рядок: <span style="color:white">${lines[0].substring(0, 50)}...</span>`);
                
                // Перевірка координат у рядку 3 (наприклад)
                const sampleRow = lines[2].split(',');
                log(`5. Перевірка координат у рядку 3: Lat: ${sampleRow[4]}, Lng: ${sampleRow[5]}`);

                if (!sampleRow[4] || isNaN(parseFloat(sampleRow[4].replace('"', '')))) {
                    log(`❌ ПОМИЛКА: Координати не знайдено або вони в невірному форматі!`, 'error');
                } else {
                    log(`✅ ТЕСТ ПРОЙДЕНО. Дані доступні для мапи.`, 'success');
                }

            } catch (err) {
                log(`❌ КРИТИЧНА ПОМИЛКА: ${err.message}`, 'error');
                log(`💡 МОЖЛИВА ПРИЧИНА: Таблиця не опублікована. Зайдіть у файл -> Поділитися -> Опублікувати в інтернеті.`, 'error');
            }
        }

        runTest();
    </script>
</body>
</html>
