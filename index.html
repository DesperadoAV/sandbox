<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/6qXnY1GR/1770893073813.png">
    <title>Svitlo Slavutych - Full Details</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        .ui-btn { position: absolute; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: none; }
        .side-btn { left: 15px; top: 15px; width: 48px; height: 48px; }
        .info-btn { left: 15px; top: 75px; width: 48px; height: 48px; color: #228BE6; font-size: 20px; font-weight: bold; }
        .graph-btn { left: 15px; top: 135px; width: 48px; height: 48px; }
        .forecast-btn { left: 15px; top: 195px; width: 48px; height: 48px; font-size: 22px; }

        #emergency-banner { display: none; position: absolute; top: 0; width: 100%; background: #d94141; color: white; z-index: 2005; padding: 12px; text-align: center; font-weight: bold; font-size: 14px; box-sizing: border-box; }
        .banner-active .ui-btn { transform: translateY(50px); }

        .zoom-ctrl { position: absolute; right: 15px; bottom: 30px; z-index: 1001; display: flex; flex-direction: column; gap: 8px; }
        .z-btn { width: 44px; height: 44px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; }

        .q-menu { position: absolute; left: 75px; top: 15px; width: 280px; max-height: 80vh; background: white; border-radius: 16px; display: none; flex-direction: column; z-index: 1001; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .q-header { display: flex; align-items: center; padding: 12px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .address-list { display: none; background: #f9f9f9; max-height: 200px; overflow-y: auto; }
        .address-item { padding: 8px 15px 8px 40px; font-size: 13px; border-bottom: 1px solid #eee; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; border-radius: 20px; padding: 20px; width: 100%; max-width: 340px; position: relative; }
        .modal-screen { display: none; flex-direction: column; gap: 10px; }
        .modal-screen.active { display: flex; }
        .btn-link { display: flex; align-items: center; padding: 12px; background: #f5f5f5; border-radius: 10px; text-decoration: none; color: #333; font-weight: bold; }
    </style>
</head>
<body>

    <div id="emergency-banner"><span id="emergency-text"></span></div>
    <div id="map"></div>

    <div class="ui-btn side-btn" onclick="toggleMenu()"><img src="https://img.icons8.com/material-rounded/24/228BE6/layers.png"/></div>
    <div class="ui-btn info-btn" onclick="openInfo()">і</div>
    <div class="ui-btn graph-btn" onclick="toggleModal('graphModal')"><img src="https://img.icons8.com/material-rounded/24/228BE6/calendar.png"/></div>
    <div class="ui-btn forecast-btn" onclick="toggleModal('forecastModal')">🔮</div>

    <div class="zoom-ctrl">
        <div class="z-btn" onclick="map.zoomIn()">+</div>
        <div class="z-btn" onclick="map.zoomOut()">−</div>
    </div>

    <div class="q-menu" id="qMenu">
        <div style="padding:15px; font-weight:bold; text-align:center; border-bottom:1px solid #eee;">Черги</div>
        <div id="menu-list" style="overflow-y:auto;"></div>
    </div>

    <div class="modal" id="infoModal" onclick="toggleModal('infoModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="screen-main" class="modal-screen active">
                <h3>Svitlo Slavutych</h3>
                <div class="btn-link" onclick="showScreen('tg')">Telegram Канали</div>
                <div class="btn-link" onclick="showScreen('vb')" style="margin-top:8px">Viber Канали</div>
            </div>
            <div id="screen-tg" class="modal-screen">
                <div onclick="showScreen('main')" style="cursor:pointer; color:#228BE6; font-weight:bold;">← Назад</div>
                <div id="tg-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px;"></div>
            </div>
            <div id="screen-vb" class="modal-screen">
                <div onclick="showScreen('main')" style="cursor:pointer; color:#228BE6; font-weight:bold;">← Назад</div>
                <div id="vb-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="forecastModal" onclick="toggleModal('forecastModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top:0">Прогноз відключень</h3>
            <div id="forecast-list"></div>
        </div>
    </div>

    <div class="modal" id="graphModal" onclick="toggleModal('graphModal')">
        <div class="modal-content" style="max-width: 500px;" onclick="event.stopPropagation()">
            <img src="https://raw.githubusercontent.com/amvasylets/Svitlo_in_Slavutych/refs/heads/main/charts/summary_today.png" style="width:100%; border-radius:10px;">
        </div>
    </div>

    <script>
        const DOC_ID = "2PACX-1vTDv155RMF-zxABtNBXm81ycd6eLswlpDqowPApt-ffwOn1q9J32hZucYSGvCMBDV0RpB1qfrRsHELs";
        const MAP_DATA_GID = "1910800617";
        const LINKS = {
            tg: {"1.1":"https://t.me/svitlo_in_Slavutych_1_1","2.1":"https://t.me/svitlo_in_Slavutych_2_1","3.1":"https://t.me/svitlo_in_Slavutych_3_1","3.2":"https://t.me/svitlo_in_Slavutych_3_2","4.1":"https://t.me/svitlo_in_Slavutych_4_1","6.1":"https://t.me/svitlo_in_Slavutych_6_1"},
            vb: {"1.1":"https://invite.viber.com/?g2=AQAwYtpyJWoodlZaVSylf8qXJh%2BIkorI%2BUEIlSNEjLY97kwXcxRXWcee8Wt%2FJM%2FS","2.1":"https://invite.viber.com/?g2=AQBXEog0eJuMg1ZaVvzFZ14R%2Bq%2B3qDs5gmfU3pLXpwkPygNpg43EBTllJkScCQI6","3.1":"https://invite.viber.com/?g2=AQA8UIh2a1ur71ZaVlCe5j56cKWAwAem1kuhxYeCg9xsUb8AFCKgRE5duiSA3fvW","3.2":"https://invite.viber.com/?g2=AQA9Od9EXDrYslZaNY2rHJ1v1t8S5lA9RGxcLlvDP4ujK3n%2BHMvVHzeWmldseJdN","4.1":"https://invite.viber.com/?g2=AQAr4i0FDuS0TlZaWDF6W2Hk%2BTDJrVrCLKTBQSvAwDb7JPuDYn0HE0WtouQyqIm7","6.1":"https://invite.viber.com/?g2=AQBP%2BePVKBjDBFZaVeCnWMT9gn%2Fl2vl2636E%2B9vRvecZjNegiPbNxN93KG90spyY"}
        };
        const QUEUE_CONFIG = {
            "1.1": { gid: "0", icon: "red", color: "#ff0000" },
            "2.1": { gid: "1407012161", icon: "blue", color: "#0000ff" },
            "3.1": { gid: "774761347", icon: "violet", color: "#9900ff" },
            "3.2": { gid: "1047238720", icon: "gold", color: "#ffcc00" },
            "4.1": { gid: "877384835", icon: "orange", color: "#ff9900" },
            "6.1": { gid: "1811736051", icon: "green", color: "#009933" }
        };

        const map = L.map('map', { zoomControl: false }).setView([51.5229, 30.7598], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let layers = {}, activeQueues = new Set(Object.keys(QUEUE_CONFIG)), sheetData = {}, markersStore = {};

        function getIcon(color) { return new L.Icon({ iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`, shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] }); }

        async function updateGlobals() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${MAP_DATA_GID}&t=${Date.now()}`);
                const rows = (await res.text()).split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                const msg = rows[9]?.[2]?.replace(/"/g, '');
                if (msg && msg.length > 1) { 
                    document.getElementById('emergency-text').innerText = "⚠️ " + msg;
                    document.getElementById('emergency-banner').style.display = "block";
                    document.body.classList.add('banner-active');
                }
                let fHtml = "";
                for (let i = 1; i <= 6; i++) {
                    if (rows[i]) fHtml += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:13px;"><span><b>${rows[i][0]}</b></span> <span>${rows[i][2]} <b>${rows[i][3]}</b></span></div>`;
                }
                document.getElementById('forecast-list').innerHTML = fHtml;
            } catch(e) {}
        }

        async function fetchQueue(q) {
            const conf = QUEUE_CONFIG[q];
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/e/${DOC_ID}/pub?output=csv&gid=${conf.gid}&t=${Date.now()}`);
                const rows = (await res.text()).split(/\r?\n/).map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
                
                if (layers[q]) map.removeLayer(layers[q]);
                layers[q] = L.layerGroup();
                sheetData[q] = []; markersStore[q] = {};

                for (let i = 2; i < rows.length; i++) {
                    const r = rows[i]; if (!r[3]) continue;
                    const lat = parseFloat(r[3].replace(',','.')), lng = parseFloat(r[4].replace(',','.'));
                    const light = (r[5]?.toLowerCase() === 'y');
                    
                    // НОВА ЛОГІКА ПОПАПУ (H, I, K, L)
                    const currentStatusMsg = r[7] || (light ? "Світло є" : "Світла немає"); // стовпчик H
                    const lastChangeTime = r[8] || ""; // стовпчик I
                    const futureStatusMsg = r[10] || ""; // стовпчик K
                    const futureTime = r[11] || ""; // стовпчик L

                    let statusBlock = `
                        <div style="padding:8px; border-radius:8px; background:${light?'#f0fff4':'#fff5f5'}; border:1px solid ${light?'#dcfce7':'#fee2e2'};">
                            <div style="font-weight:bold; color:${light?'#2f855a':'#c53030'}; font-size:13px;">
                                ${light ? '●' : '○'} ${currentStatusMsg} ${lastChangeTime}
                            </div>
                    `;

                    if (futureStatusMsg) {
                        const isNoOutage = futureStatusMsg.includes("За графіком вимкнень немає");
                        statusBlock += `<div style="margin-top:6px; font-size:12px; color:${isNoOutage?'#228BE6':'#444'}; border-top:1px solid rgba(0,0,0,0.05); padding-top:4px;">
                            ${futureStatusMsg} <b>${futureTime}</b>
                        </div>`;
                    }
                    statusBlock += `</div>`;

                    const popup = `
                        <div style="min-width:200px; font-family: sans-serif;">
                            <b style="font-size:15px; color:#333;">${r[1]}</b>
                            ${r[2] ? `<div style="font-size:11px; color:#666; margin-bottom:8px; font-style:italic;">${r[2]}</div>` : '<div style="height:5px"></div>'}
                            ${statusBlock}
                        </div>
                    `;

                    const m = L.marker([lat, lng], { icon: getIcon(light ? conf.icon : "grey") }).bindPopup(popup);
                    m.addTo(layers[q]); markersStore[q][r[1]] = m; sheetData[q].push(r[1]);
                }
                if (activeQueues.has(q)) layers[q].addTo(map);
            } catch(e) {}
        }

        function renderMenu() {
            document.getElementById('menu-list').innerHTML = Object.keys(QUEUE_CONFIG).map(q => `
                <div>
                    <div class="q-header" onclick="toggleAccordion('${q}')">
                        <div style="width:12px; height:12px; background:${QUEUE_CONFIG[q].color}; border-radius:3px; margin-right:10px;"></div>
                        <span style="flex:1; font-size:14px;">Черга ${q}</span>
                        <div onclick="event.stopPropagation(); toggleVis('${q}')" style="padding:5px;">
                            <img src="https://img.icons8.com/material-rounded/18/${activeQueues.has(q)?'228BE6':'999'}/visible.png"/>
                        </div>
                    </div>
                    <div class="address-list" id="list-${q}">
                        ${(sheetData[q]||[]).map(a => `<div class="address-item" onclick="focusAddr('${q}','${a}')">${a}</div>`).join('')}
                    </div>
                </div>`).join('');
        }

        function toggleVis(q) {
            if (activeQueues.has(q)) { activeQueues.delete(q); map.removeLayer(layers[q]); }
            else { activeQueues.add(q); layers[q].addTo(map); }
            renderMenu();
        }
        function toggleAccordion(q) {
            const el = document.getElementById(`list-${q}`);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('.address-list').forEach(d => d.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'block';
        }
        function focusAddr(q, a) { const m = markersStore[q][a]; if(m) { map.setView(m.getLatLng(), 18); m.openPopup(); } }
        function openInfo() {
            const qs = Object.keys(QUEUE_CONFIG);
            document.getElementById('tg-grid').innerHTML = qs.map(q => `<a href="${LINKS.tg[q]}" target="_blank" style="padding:10px; background:#f0f0f0; border-radius:8px; text-align:center; text-decoration:none; color:#333; font-size:12px;">${q}</a>`).join('');
            document.getElementById('vb-grid').innerHTML = qs.map(q => `<a href="${LINKS.vb[q]}" target="_blank" style="padding:10px; background:#f0f0f0; border-radius:8px; text-align:center; text-decoration:none; color:#333; font-size:12px;">${q}</a>`).join('');
            toggleModal('infoModal');
        }
        function showScreen(id) { document.querySelectorAll('.modal-screen').forEach(s => s.classList.remove('active')); document.getElementById('screen-'+id).classList.add('active'); }
        function toggleModal(id) { const m = document.getElementById(id); m.style.display = (m.style.display === 'flex')? 'none' : 'flex'; }
        function toggleMenu() { const m = document.getElementById('qMenu'); m.style.display = (m.style.display === 'flex')? 'none' : 'flex'; }

        async function init() {
            await updateGlobals();
            for(let q in QUEUE_CONFIG) await fetchQueue(q);
            renderMenu();
        }
        init(); setInterval(init, 60000);
    </script>
</body>
</html>
